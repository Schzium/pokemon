<!doctype html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#070b16">
  <title>Pokédex</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <main class="app">
    <header class="header">
      <div class="brand">
        <div class="pokeball"></div>
        <div>
          <h1>Pokédex</h1>
          <p>Generation 1 to 9, including major forms and variants.</p>
        </div>
      </div>
    </header>

    <section class="add-panel database-status-panel">
      <div>
        <label>Database Status</label>
        <p id="loadingStatus" class="loading-status">Preparing Pokédex...</p>
      </div>
    </section>

    <section class="toolbar">
      <input id="searchInput" placeholder="Search Pokémon">
      <select id="typeFilter">
        <option value="all">All Types</option>
      </select>
      <select id="statusFilter">
        <option value="all">Filter</option>
        <option value="caught">Caught</option>
        <option value="favorite">Favorite</option>
        <option value="shiny">Shiny</option>
      </select>
    </section>

    <section id="cards" class="cards"></section>
  </main>

  <aside id="detail" class="detail"></aside>

  <script src="database.js"></script>
  <script src="app.js"></script>
  <script>
    if ("serviceWorker" in navigator && location.protocol.startsWith("http")) {
      navigator.serviceWorker.register("./sw.js").catch(() => {});
    }
  </script>
</body>
</html>
